plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
    localProperties.load(reader)
}
}


def flutterVersionCode = localProperties.getProperty('flutter.versionCode')
if (flutterVersionCode == null) {
    flutterVersionCode = '1'
}

def flutterVersionName = localProperties.getProperty('flutter.versionName')
if (flutterVersionName == null) {
    flutterVersionName = '1.0'
}

def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file('key.properties')
def hasReleaseKeystore = false
if (keystorePropertiesFile.exists()) {
    keystorePropertiesFile.withReader('UTF-8') { reader ->
        keystoreProperties.load(reader)
    }
    hasReleaseKeystore = keystoreProperties.getProperty('storeFile') != null
}

// Solo para pruebas locales SIN keystore. NUNCA subas a Play un AAB/APK generado asi.
def allowDebugSigningRelease = project.findProperty('teaf.allow.debug.signing.release') == 'true'

android {
    namespace "com.teaf_app"
    compileSdkVersion flutter.compileSdkVersion

sourceSets {
    main.java.srcDirs += 'src/main/kotlin'
}

lintOptions {
    disable 'InvalidPackage'
}

compileOptions {
    sourceCompatibility JavaVersion.VERSION_17
    targetCompatibility JavaVersion.VERSION_17
}

kotlinOptions {
    jvmTarget = '17'
}

defaultConfig {
    // TODO: Specify your own unique Application ID 
    // (https://developer.android.com/studio/build/application-id.html).
    applicationId "com.teaf_app"
    minSdkVersion flutter.minSdkVersion
    targetSdkVersion flutter.targetSdkVersion
    versionCode flutterVersionCode.toInteger()
    versionName flutterVersionName
}

    signingConfigs {
        release {
            if (hasReleaseKeystore) {
                storeFile = rootProject.file(keystoreProperties.getProperty('storeFile'))
                storePassword = keystoreProperties.getProperty('storePassword')
                keyAlias = keystoreProperties.getProperty('keyAlias')
                keyPassword = keystoreProperties.getProperty('keyPassword')
            }
        }
    }

    buildTypes {
        release {
            if (hasReleaseKeystore) {
                signingConfig signingConfigs.release
            } else if (allowDebugSigningRelease) {
                // Depuracion: firma debug (Google Play lo rechaza)
                signingConfig signingConfigs.debug
            } else {
                throw new GradleException(
                    "Falta firma de publicacion: crea android/key.properties a partir de key.properties.example " +
                    "y coloca el .jks en android/. Para pruebas locales sin keystore, anade en gradle.properties " +
                    "teaf.allow.debug.signing.release=true (no subas ese artefacto a Play)."
                )
            }
        }
    }
}

flutter {
    source '../..'
}
